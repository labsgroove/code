<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Scanner Mobile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#0f0f0f">
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 20px;
      text-align: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 1px solid #333;
    }

    .header h1 {
      font-size: 1.3rem;
      font-weight: 600;
      color: #00d4ff;
      letter-spacing: 0.5px;
    }

    .header p {
      font-size: 0.85rem;
      color: #888;
      margin-top: 5px;
    }

    .scanner-container {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    .camera-wrapper {
      position: relative;
      width: 100%;
      max-width: 400px;
      aspect-ratio: 4/3;
      border-radius: 20px;
      overflow: hidden;
      background: #1a1a1a;
      box-shadow: 0 20px 60px rgba(0, 212, 255, 0.15);
    }

    #camera {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    #camera video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
    }

    .scan-frame {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 75%;
      height: 45%;
      border: 2px solid rgba(0, 212, 255, 0.8);
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
      pointer-events: none;
    }

    .scan-frame::before,
    .scan-frame::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 3px solid #00d4ff;
    }

    .scan-frame::before {
      top: -3px;
      left: -3px;
      border-right: none;
      border-bottom: none;
    }

    .scan-frame::after {
      bottom: -3px;
      right: -3px;
      border-left: none;
      border-top: none;
    }

    .corner-tl::before,
    .corner-tl::after,
    .corner-br::before,
    .corner-br::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 3px solid #00d4ff;
    }

    .corner-tl::before {
      top: -3px;
      right: -3px;
      border-left: none;
      border-bottom: none;
    }

    .corner-tl::after {
      bottom: -3px;
      left: -3px;
      border-right: none;
      border-top: none;
    }

    .scan-line {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00d4ff, transparent);
      animation: scan 2s linear infinite;
      box-shadow: 0 0 10px #00d4ff;
    }

    @keyframes scan {
      0% { top: 0; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }

    .scan-instruction {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
      color: #ccc;
      backdrop-filter: blur(10px);
    }

    .result-section {
      width: 100%;
      max-width: 400px;
      margin-top: 20px;
      padding: 0 10px;
    }

    .input-group {
      position: relative;
      background: #1a1a2e;
      border-radius: 16px;
      padding: 5px;
      border: 1px solid #333;
      transition: border-color 0.3s;
    }

    .input-group:focus-within {
      border-color: #00d4ff;
    }

    #barcode {
      width: 100%;
      padding: 15px 20px;
      font-size: 1.1rem;
      font-weight: 600;
      color: #fff;
      background: transparent;
      border: none;
      outline: none;
      text-align: center;
      letter-spacing: 1px;
    }

    #barcode::placeholder {
      color: #666;
      font-weight: 400;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 15px;
      font-size: 0.9rem;
      color: #888;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .flash-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 212, 255, 0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
      z-index: 1000;
    }

    .flash-overlay.active {
      opacity: 1;
    }
  </style>
</head>
<body>

  <div class="flash-overlay" id="flash"></div>

  <header class="header">
    <h1>Scanner Mobile</h1>
    <p>Posicione o código dentro do frame</p>
  </header>

  <main class="scanner-container">
    <div class="camera-wrapper">
      <div id="camera"></div>
      <div class="scan-frame">
        <div class="corner-tl"></div>
        <div class="corner-br"></div>
        <div class="scan-line"></div>
      </div>
      <div class="scan-instruction">
        Alinhe o código de barras aqui
      </div>
    </div>

    <section class="result-section">
      <div class="input-group">
        <input type="text" id="barcode" placeholder="Aguardando scan..." readonly>
      </div>
      <div class="status-indicator">
        <span class="status-dot"></span>
        <span id="status-text">Camera ativa</span>
      </div>
    </section>
  </main>

  <script src="quagga.min.js"></script>
  <script src="app.js"></script>

</body>
</html>
